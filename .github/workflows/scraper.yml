jobs:
  scrape:
    runs-on: ubuntu-latest  # Changed from ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node for npx
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade pip and build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install common system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libx11-xcb1 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 \
            libpangocairo-1.0-0 libcups2 libxss1 libgtk-3-0 || \
            sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browsers and system deps via npx
        run: |
          pip install playwright || true
          npx playwright install --with-deps

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.scraper