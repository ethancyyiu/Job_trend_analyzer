name: Scrape LinkedIn Jobs (Docker)

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/playwright/python:latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upgrade pip and install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.scraper
