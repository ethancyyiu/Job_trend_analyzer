on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system libraries (Ubuntu 22.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libx11-xcb1 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libasound2 libpangocairo-1.0-0 libcups2 libxss1 \
            libgtk-3-0 fonts-liberation libu2f-udev xdg-utils

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium 
          playwright install-deps chromium

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.scraper
