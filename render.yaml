services:
  - type: web
    name: job-trend-api
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd ..
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
    autoDeploy: true  
 
   - type: worker           
    name: job-trend-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps
    startCommand: python -m scraper.scheduler
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LI_EMAIL
        sync: false
      - key: LI_PASSWORD
        sync: false
      - key: SESSION_COOKIE
        sync: false
    autoDeploy: true